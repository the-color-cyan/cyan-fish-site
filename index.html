<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>cyan.fish</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #00d4d4;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .terminal {
            width: 100%;
            max-width: 680px;
        }

        .prompt-line {
            display: flex;
            align-items: flex-end;
            gap: 0.1rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }

        .user {
            color: #00ffff;
            font-weight: 700;
        }

        .at {
            color: #888888;
        }

        .host {
            color: #00ffcc;
            font-weight: 700;
            opacity: 0.6;
        }

        .path {
            color: #888888;
        }

        .arrow {
            color: #00d4d4;
        }

        .cmd {
            color: #ffffff;
        }

        .output {
            color: #aaa;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            padding-left: 0;
        }

        .output .highlight {
            color: #00ffff;
        }

        .output .dim {
            color: #555;
        }

        .output .warn {
            color: #ff4b5a;
        }

        .cursor {
            display: inline-block;
            width: 0.6em;
            height: 1.3em;
            background: #00d4d4;
            vertical-align: middle;
            animation: blink 1.1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        .fish-logo {
            color: #00ffcc;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            opacity: 0.6;
            white-space: pre;
            line-height: 1.2;
        }

        a.link {
            color: #00ffff;
            text-decoration: underline;
        }

        .motd {
            color: #aaa;
            font-size: 0.75rem;
            opacity: 0.6;
            line-height: 1;
            margin-bottom: -1rem;
            padding-left: 0;
        }
    </style>
</head>
<body>
<div class="terminal">

    <pre class="fish-logo">
><(((º>
</pre>

    <div class="prompt-line">
        <span class="user">cyan</span><span class="at">@</span><span class="host">cyan.fish</span>
        <span class="path">~</span>
        <span class="arrow">❯</span>
        <span class="cmd">whoami</span>
    </div>
    <div class="output">
        <span class="highlight">cyan</span><br>
        <span class="dim"># equal parts green and blue</span>
    </div>

    <div class="prompt-line">
        <span class="user">cyan</span><span class="at">@</span><span class="host">cyan.fish</span>
        <span class="path">~</span>
        <span class="arrow">❯</span>
        <span class="cmd">cat /etc/motd</span>
    </div>

    <div class="output">
        <span class="dim"># sometimes I like to make computers do things</span><br>
        <a class="link" href="https://github.com/the-color-cyan">github.com/the-color-cyan</a>
    </div>

    <div class="prompt-line">
        <span class="user">cyan</span><span class="at">@</span><span class="host">cyan.fish</span>
        <span class="path">~</span>
        <span class="arrow">❯</span>
        <span class="cmd">uptime</span>
    </div>
    <div class="output">
        <span class="warn">longer than intended</span>
    </div>

    <div class="prompt-line">
        <span class="user">cyan</span><span class="at">@</span><span class="host">cyan.fish</span>
        <span class="path">~</span>
        <span class="arrow">❯</span>
        <span class="cursor"></span>
    </div>

</div>
</body>
</html>
